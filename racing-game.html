<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Drift — IM Racing Challenge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select: none;
  }

  canvas {
    display: block;
  }

  #ui-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #hud {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #hud.visible { opacity: 1; }

  .hud-item {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(39, 193, 244, 0.3);
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(39, 193, 244, 0.7);
    margin-bottom: 2px;
  }

  .hud-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  #start-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, rgba(39, 193, 244, 0.08) 0%, rgba(10, 10, 26, 0.95) 70%);
  }

  #start-screen h1 {
    font-size: 72px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 8px;
    margin-bottom: 8px;
    text-shadow: 0 0 40px rgba(39, 193, 244, 0.5), 0 0 80px rgba(39, 193, 244, 0.2);
  }

  #start-screen .subtitle {
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(39, 193, 244, 0.7);
    margin-bottom: 50px;
  }

  #start-screen .prompt {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  #start-screen .controls-info {
    margin-top: 40px;
    display: flex;
    gap: 30px;
  }

  .control-key {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .key-box {
    width: 44px;
    height: 44px;
    border: 2px solid rgba(39, 193, 244, 0.4);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(39, 193, 244, 0.8);
    font-size: 18px;
    background: rgba(39, 193, 244, 0.05);
  }

  .key-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
  }

  #countdown {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: 800;
    color: #fff;
    z-index: 25;
    opacity: 0;
    text-shadow: 0 0 60px rgba(39, 193, 244, 0.8);
    pointer-events: none;
  }

  #finish-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: rgba(10, 10, 26, 0.9);
    backdrop-filter: blur(5px);
  }

  #finish-screen h2 {
    font-size: 56px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 10px;
    text-shadow: 0 0 40px rgba(39, 193, 244, 0.5);
  }

  #finish-screen .result-position {
    font-size: 20px;
    color: rgba(39, 193, 244, 0.8);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .result-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 40px;
  }

  .result-stat {
    text-align: center;
  }

  .result-stat .val {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
  }

  .result-stat .lbl {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(39, 193, 244, 0.6);
    margin-top: 4px;
  }

  #finish-screen .restart-prompt {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  #minimap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 160px;
    height: 160px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #minimap.visible { opacity: 1; }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes countPop {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
  }

  @keyframes itemPulse {
    0%, 100% { transform: scale(1); box-shadow: none; }
    50% { transform: scale(1.06); }
  }

  #hud-powerup-item.has-item {
    animation: itemPulse 0.7s ease-in-out infinite;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-item">
    <div class="hud-label">Position</div>
    <div class="hud-value" id="hud-position">1st</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Lap</div>
    <div class="hud-value" id="hud-lap">1 / 3</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Time</div>
    <div class="hud-value" id="hud-time">0:00.0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Speed</div>
    <div class="hud-value" id="hud-speed">0</div>
  </div>
  <div class="hud-item" id="hud-powerup-item">
    <div class="hud-label">Item · SPACE</div>
    <div class="hud-value" id="hud-powerup" style="font-size:14px;letter-spacing:1px;transition:color 0.2s;">---</div>
  </div>
</div>

<canvas id="minimap" width="160" height="160"></canvas>

<div id="start-screen">
  <h1>Neon Drift</h1>
  <div class="subtitle">Integral Media Racing Challenge</div>
  <div class="prompt">Press SPACE to start</div>
  <div class="controls-info">
    <div class="control-key">
      <div class="key-box">&#9650;</div>
      <div class="key-label">Accelerate</div>
    </div>
    <div class="control-key">
      <div class="key-box">&#9660;</div>
      <div class="key-label">Brake</div>
    </div>
    <div class="control-key">
      <div class="key-box">&#9664;</div>
      <div class="key-label">Steer Left</div>
    </div>
    <div class="control-key">
      <div class="key-box">&#9654;</div>
      <div class="key-label">Steer Right</div>
    </div>
    <div class="control-key">
      <div class="key-box" style="width:80px;font-size:12px;letter-spacing:1px;">SPACE</div>
      <div class="key-label">Use Item</div>
    </div>
  </div>
</div>

<div id="countdown"></div>

<div id="finish-screen">
  <h2 id="finish-title">Race Complete</h2>
  <div class="result-position" id="finish-position"></div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="val" id="finish-time">0:00.0</div>
      <div class="lbl">Total Time</div>
    </div>
    <div class="result-stat">
      <div class="val" id="finish-best">0:00.0</div>
      <div class="lbl">Best Lap</div>
    </div>
  </div>
  <div class="restart-prompt">Press SPACE to race again</div>
</div>

<script>
// ============================================================
// NEON DRIFT — A top-down neon racing game
// Built for the IM Racing Challenge
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

// --- TRACK DEFINITION ---
// The track is defined as a series of waypoints forming a loop
const trackPoints = [
  { x: 700,  y: 400 },   // start/finish
  { x: 1200, y: 300 },   // main straight
  { x: 1850, y: 270 },   // extends straight
  { x: 2250, y: 390 },   // sweeping right entry
  { x: 2430, y: 650 },   // tight hairpin apex
  { x: 2280, y: 920 },   // hairpin exit
  { x: 1980, y: 1100 },  // back section entry
  { x: 1560, y: 1220 },  // long back straight
  { x: 1120, y: 1270 },  // wide sweeper
  { x: 720,  y: 1210 },  // sweeper continues
  { x: 400,  y: 1060 },  // left hairpin entry
  { x: 190,  y: 840 },   // left hairpin apex
  { x: 170,  y: 570 },   // chicane section
  { x: 320,  y: 370 },   // chicane exit
  { x: 510,  y: 300 },   // back to main straight
];

const TRACK_WIDTH = 120;
const TOTAL_LAPS = 3;
const NUM_AI = 3;

// --- GAME STATE ---
let gameState = 'menu'; // menu, countdown, racing, finished
let raceTime = 0;
let lastTimestamp = 0;
let bestLap = Infinity;
let lapTimes = [];

// --- RESIZE ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- TRACK GEOMETRY ---
function getTrackSpline() {
  // Catmull-Rom spline through track points
  const pts = trackPoints;
  const spline = [];
  const segments = 30;

  for (let i = 0; i < pts.length; i++) {
    const p0 = pts[(i - 1 + pts.length) % pts.length];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % pts.length];
    const p3 = pts[(i + 2) % pts.length];

    for (let t = 0; t < segments; t++) {
      const f = t / segments;
      const f2 = f * f;
      const f3 = f2 * f;

      spline.push({
        x: 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * f + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * f2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * f3),
        y: 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * f + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * f2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * f3)
      });
    }
  }
  return spline;
}

const trackSpline = getTrackSpline();

// Calculate track distances for progress tracking
const trackDistances = [0];
let totalTrackLength = 0;
for (let i = 1; i <= trackSpline.length; i++) {
  const prev = trackSpline[i - 1];
  const curr = trackSpline[i % trackSpline.length];
  const d = Math.hypot(curr.x - prev.x, curr.y - prev.y);
  totalTrackLength += d;
  trackDistances.push(totalTrackLength);
}

// Get normal at a point on the spline
function getTrackNormal(index) {
  const curr = trackSpline[index];
  const next = trackSpline[(index + 1) % trackSpline.length];
  const dx = next.x - curr.x;
  const dy = next.y - curr.y;
  const len = Math.hypot(dx, dy);
  return { x: -dy / len, y: dx / len };
}

// Get tangent angle at a point
function getTrackAngle(index) {
  const curr = trackSpline[index];
  const next = trackSpline[(index + 1) % trackSpline.length];
  return Math.atan2(next.y - curr.y, next.x - curr.x);
}

// Find closest point on track
function getClosestTrackPoint(x, y) {
  let minDist = Infinity;
  let closestIdx = 0;
  for (let i = 0; i < trackSpline.length; i++) {
    const d = Math.hypot(trackSpline[i].x - x, trackSpline[i].y - y);
    if (d < minDist) {
      minDist = d;
      closestIdx = i;
    }
  }
  return { index: closestIdx, dist: minDist };
}

// --- START/FINISH LINE ---
const startIdx = 0;
const startPoint = trackSpline[startIdx];
const startNormal = getTrackNormal(startIdx);
const startAngle = getTrackAngle(startIdx);

// --- CHECKPOINTS ---
// Three invisible gates at ~25%, 50%, 75% of the lap.
// All three must be crossed in forward order before the finish line counts.
const CHECKPOINT_INDICES = [
  Math.floor(trackSpline.length * 0.25),
  Math.floor(trackSpline.length * 0.50),
  Math.floor(trackSpline.length * 0.75),
];

// --- CAR CLASS ---
class Car {
  constructor(color, glowColor, isPlayer = false, startOffset = 0) {
    this.isPlayer = isPlayer;
    this.color = color;
    this.glowColor = glowColor;
    this.width = 20;
    this.height = 36;

    // Position on track (offset from start)
    const idx = (startIdx + 2) % trackSpline.length;
    const normal = getTrackNormal(idx);
    this.x = trackSpline[idx].x + normal.x * startOffset;
    this.y = trackSpline[idx].y + normal.y * startOffset;
    this.angle = startAngle;

    this.speed = 0;
    this.maxSpeed = isPlayer ? 5.5 : 5.0 + Math.random() * 0.8;
    this.acceleration = isPlayer ? 0.12 : 0.10;
    this.braking = 0.08;
    this.friction = 0.02;
    this.turnSpeed = isPlayer ? 0.045 : 0.04;
    this.offTrackFriction = 0.06;

    this.lap = 0;
    this.lastCheckpoint = 0;
    this.progress = 0;
    this.lapStartTime = 0;
    this.finished = false;
    this.finishTime = 0;

    // AI
    this.aiTargetIdx = (idx + 20) % trackSpline.length;
    this.aiOffset = (Math.random() - 0.5) * TRACK_WIDTH * 0.4;

    // Trail
    this.trail = [];
    this.trailTimer = 0;

    // Power-up state
    this.heldPowerup = null;
    this.activePowerupType = null;
    this.powerupTimer = 0;
    this.speedMultiplier = 1;
    this.shieldActive = false;
    this.spinTimer = 0;
    this.slowTimer = 0;
    this.aiPowerupDelay = 0;

    // Checkpoint validation (prevents reverse-lap exploit)
    this.nextCheckpoint = 0; // must pass CP 0,1,2 in order before finish counts
  }

  reset(startOffset) {
    const idx = (startIdx + 2) % trackSpline.length;
    const normal = getTrackNormal(idx);
    this.x = trackSpline[idx].x + normal.x * startOffset;
    this.y = trackSpline[idx].y + normal.y * startOffset;
    this.angle = startAngle;
    this.speed = 0;
    this.lap = 0;
    this.lastCheckpoint = 0;
    this.progress = 0;
    this.finished = false;
    this.finishTime = 0;
    this.lapStartTime = 0;
    this.trail = [];
    this.aiTargetIdx = (idx + 20) % trackSpline.length;

    this.heldPowerup = null;
    this.activePowerupType = null;
    this.powerupTimer = 0;
    this.speedMultiplier = 1;
    this.shieldActive = false;
    this.spinTimer = 0;
    this.slowTimer = 0;
    this.aiPowerupDelay = 0;
    this.nextCheckpoint = 0;
  }

  update(dt, keys) {
    if (this.finished) {
      this.speed *= 0.97;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;
      return;
    }

    // Tick active power-up timer
    if (this.powerupTimer > 0) {
      this.powerupTimer -= dt;
      if (this.powerupTimer <= 0) {
        this.powerupTimer = 0;
        this.activePowerupType = null;
        this.speedMultiplier = 1;
        this.shieldActive = false;
      }
    }

    // Tick slow debuff (ink bomb)
    if (this.slowTimer > 0) this.slowTimer -= dt;

    const closest = getClosestTrackPoint(this.x, this.y);

    // Spin-out overrides all controls
    if (this.spinTimer > 0) {
      this.spinTimer -= dt;
      this.angle += 0.18;
      this.speed *= 0.93;
      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;
      this.updateProgress(closest);
      this.trailTimer += dt;
      if (this.trailTimer > 16 && Math.abs(this.speed) > 0.5) {
        this.trailTimer = 0;
        this.trail.push({
          x: this.x - Math.cos(this.angle) * this.height * 0.4,
          y: this.y - Math.sin(this.angle) * this.height * 0.4,
          alpha: 0.6,
          size: 3 + Math.abs(this.speed) * 0.5
        });
      }
      for (let i = this.trail.length - 1; i >= 0; i--) {
        this.trail[i].alpha -= 0.008;
        if (this.trail[i].alpha <= 0) this.trail.splice(i, 1);
      }
      return;
    }

    const onTrack = closest.dist < TRACK_WIDTH * 0.65;

    if (this.isPlayer) {
      // Player controls
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        this.speed += this.acceleration;
      }
      if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        this.speed -= this.braking;
      }

      const turnAmount = this.turnSpeed * Math.min(1, this.speed / 2);
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        this.angle -= turnAmount;
      }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        this.angle += turnAmount;
      }
    } else {
      // AI driving
      this.updateAI(dt, closest);
    }

    // Apply friction (shield bypasses off-track penalty)
    if (onTrack || this.shieldActive) {
      this.speed *= (1 - this.friction);
    } else {
      this.speed *= (1 - this.offTrackFriction);
    }

    // Effective max speed (power-up multiplier × slow debuff)
    const effMax = this.maxSpeed * this.speedMultiplier * (this.slowTimer > 0 ? 0.45 : 1);
    this.speed = Math.max(-1.5, Math.min(this.speed, effMax));

    // Move
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    // Track progress and laps
    this.updateProgress(closest);

    // Trail
    this.trailTimer += dt;
    if (this.trailTimer > 16 && Math.abs(this.speed) > 1) {
      this.trailTimer = 0;
      this.trail.push({
        x: this.x - Math.cos(this.angle) * this.height * 0.4,
        y: this.y - Math.sin(this.angle) * this.height * 0.4,
        alpha: 0.6,
        size: 3 + Math.abs(this.speed) * 0.5
      });
    }

    // Fade trail
    for (let i = this.trail.length - 1; i >= 0; i--) {
      this.trail[i].alpha -= 0.008;
      if (this.trail[i].alpha <= 0) this.trail.splice(i, 1);
    }
  }

  updateAI(dt, closest) {
    // Navigate toward target point on track with offset
    const target = trackSpline[this.aiTargetIdx];
    const targetNormal = getTrackNormal(this.aiTargetIdx);
    const tx = target.x + targetNormal.x * this.aiOffset;
    const ty = target.y + targetNormal.y * this.aiOffset;

    const targetAngle = Math.atan2(ty - this.y, tx - this.x);
    let angleDiff = targetAngle - this.angle;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

    // Steer
    const steerAmount = Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), this.turnSpeed);
    this.angle += steerAmount;

    // Throttle — brake into sharp turns
    const sharpness = Math.abs(angleDiff);
    if (sharpness > 0.5) {
      this.speed *= 0.98;
    } else {
      this.speed += this.acceleration;
    }

    // Advance target
    const distToTarget = Math.hypot(tx - this.x, ty - this.y);
    if (distToTarget < 60) {
      this.aiTargetIdx = (this.aiTargetIdx + 8 + Math.floor(Math.random() * 5)) % trackSpline.length;
      this.aiOffset = (Math.random() - 0.5) * TRACK_WIDTH * 0.4;
    }

    // Use held power-up after random delay
    if (this.heldPowerup) {
      this.aiPowerupDelay -= dt;
      if (this.aiPowerupDelay <= 0) {
        activatePowerup(this);
      }
    }
  }

  updateProgress(closest) {
    const prev = this.lastCheckpoint;
    this.lastCheckpoint = closest.index;
    this.progress = closest.index;

    // Advance through each intermediate checkpoint in forward order.
    // A checkpoint is crossed forward when the spline index moves from
    // just before it to just after it (with a tolerance window).
    if (this.nextCheckpoint < CHECKPOINT_INDICES.length) {
      const cpIdx = CHECKPOINT_INDICES[this.nextCheckpoint];
      const window = 20; // spline points of tolerance either side
      const wasBelow = prev < cpIdx + window;
      const nowAtOrPast = closest.index >= cpIdx - window && closest.index <= cpIdx + window * 3;
      if (wasBelow && nowAtOrPast && closest.index > prev - window) {
        this.nextCheckpoint++;
      }
    }

    // Finish line: only count if all three checkpoints were passed this lap.
    const quarterTrack = Math.floor(trackSpline.length / 4);
    const halfTrack = Math.floor(trackSpline.length / 2);
    const crossedFinish = prev > halfTrack && closest.index < quarterTrack;

    if (crossedFinish && this.nextCheckpoint >= CHECKPOINT_INDICES.length) {
      this.lap++;
      this.nextCheckpoint = 0;

      if (this.isPlayer) {
        const lapTime = raceTime - this.lapStartTime;
        lapTimes.push(lapTime);
        if (lapTime < bestLap) bestLap = lapTime;
        this.lapStartTime = raceTime;
      }

      if (this.lap >= TOTAL_LAPS) {
        this.finished = true;
        this.finishTime = raceTime;
      }
    }
  }

  getOverallProgress() {
    return this.lap * trackSpline.length + this.progress;
  }

  draw(ctx, camX, camY) {
    // Draw trail
    for (const t of this.trail) {
      ctx.beginPath();
      ctx.arc(t.x - camX, t.y - camY, t.size, 0, Math.PI * 2);
      ctx.fillStyle = this.glowColor.replace(')', `, ${t.alpha * 0.3})`).replace('rgb', 'rgba');
      ctx.fill();
    }

    const sx = this.x - camX;
    const sy = this.y - camY;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(this.angle + Math.PI / 2);

    // Car body
    const w = this.width;
    const h = this.height;

    // Boost / rocket exhaust flames
    if (this.speedMultiplier > 1 && this.speed > 1) {
      ctx.save();
      const flameColor = this.activePowerupType === 'rocket' ? '255,85,0' : '255,215,0';
      const flameLen = 10 + Math.random() * 14 * (this.speedMultiplier - 1);
      ctx.shadowColor = `rgb(${flameColor})`;
      ctx.shadowBlur = 18;
      ctx.fillStyle = `rgba(${flameColor},0.85)`;
      ctx.beginPath();
      ctx.moveTo(-w * 0.35, h * 0.38);
      ctx.lineTo(0, h * 0.38 + flameLen);
      ctx.lineTo(w * 0.35, h * 0.38);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Glow (star flashes colour)
    const isStarFlash = this.activePowerupType === 'star' && Math.floor(Date.now() / 120) % 2 === 0;
    ctx.shadowColor = isStarFlash ? 'rgb(255,255,0)' : this.glowColor;
    ctx.shadowBlur = isStarFlash ? 35 : 20;

    // Main body
    ctx.fillStyle = isStarFlash ? '#ffff44' : this.color;
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(w / 2, -h / 4);
    ctx.lineTo(w / 2, h / 3);
    ctx.lineTo(w / 3, h / 2);
    ctx.lineTo(-w / 3, h / 2);
    ctx.lineTo(-w / 2, h / 3);
    ctx.lineTo(-w / 2, -h / 4);
    ctx.closePath();
    ctx.fill();

    // Windshield
    ctx.fillStyle = 'rgba(39, 193, 244, 0.5)';
    ctx.fillRect(-w / 3, -h / 5, w / 1.5, h / 5);

    // Neon trim
    ctx.strokeStyle = this.glowColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(w / 2, -h / 4);
    ctx.lineTo(w / 2, h / 3);
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(-w / 2, -h / 4);
    ctx.lineTo(-w / 2, h / 3);
    ctx.stroke();

    // Tail lights
    if (this.speed < 0.5) {
      ctx.fillStyle = '#ff3333';
      ctx.shadowColor = '#ff3333';
      ctx.shadowBlur = 15;
      ctx.fillRect(-w / 2.5, h / 2.5, 4, 3);
      ctx.fillRect(w / 2.5 - 4, h / 2.5, 4, 3);
    }

    // Headlights
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 10;
    ctx.fillRect(-w / 3, -h / 2, 3, 4);
    ctx.fillRect(w / 3 - 3, -h / 2, 3, 4);

    // Shield / star halo
    if (this.shieldActive) {
      ctx.save();
      const sc = this.activePowerupType === 'star' ? '255,255,0' : '0,191,255';
      ctx.strokeStyle = `rgba(${sc},0.75)`;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = `rgb(${sc})`;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.ellipse(0, 0, w * 1.15, h * 0.72, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Ink-slow purple aura
    if (this.slowTimer > 0) {
      ctx.save();
      ctx.strokeStyle = 'rgba(155,89,182,0.65)';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgb(155,89,182)';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.ellipse(0, 0, w * 1.25, h * 0.78, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// --- CARS ---
let player;
let aiCars = [];
let allCars = [];

function createCars() {
  player = new Car('#002F6C', 'rgb(39, 193, 244)', true, 0);

  const aiColors = [
    { body: '#8b1a1a', glow: 'rgb(255, 80, 80)' },
    { body: '#1a6b1a', glow: 'rgb(80, 255, 80)' },
    { body: '#6b1a6b', glow: 'rgb(200, 80, 255)' },
  ];

  aiCars = [];
  for (let i = 0; i < NUM_AI; i++) {
    const offset = (i - 1) * 35;
    const car = new Car(aiColors[i].body, aiColors[i].glow, false, offset);
    // Stagger AI starting positions slightly behind
    const backIdx = (startIdx + 2 + (i + 1) * 4) % trackSpline.length;
    const normal = getTrackNormal(backIdx);
    car.x = trackSpline[backIdx].x + normal.x * offset;
    car.y = trackSpline[backIdx].y + normal.y * offset;
    car.angle = getTrackAngle(backIdx);
    car.aiTargetIdx = (backIdx + 20) % trackSpline.length;
    aiCars.push(car);
  }

  allCars = [player, ...aiCars];
}

createCars();

// --- PARTICLES ---
let particles = [];

function spawnParticles(x, y, color, count = 5) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      alpha: 1,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// --- POWER-UPS ---

const POWERUP_DEFS = [
  { id: 'boost',  label: 'BOOST',    color: '#FFD700', particleColor: '255,215,0',  duration: 3000 },
  { id: 'rocket', label: 'ROCKET',   color: '#FF5500', particleColor: '255,85,0',   duration: 2000 },
  { id: 'shield', label: 'SHIELD',   color: '#00BFFF', particleColor: '0,191,255',  duration: 5000 },
  { id: 'banana', label: 'BANANA',   color: '#FFE600', particleColor: '255,230,0',  duration: 0    },
  { id: 'ink',    label: 'INK BOMB', color: '#9B59B6', particleColor: '155,89,182', duration: 0    },
  { id: 'star',   label: 'STAR!',    color: '#FFFF00', particleColor: '255,255,80', duration: 4000 },
];

// Evenly spaced spawn points around the 450-point spline (15 waypoints × 30 segments)
const POWERUP_SPAWN_INDICES = [45, 135, 225, 315, 405];
let powerupItems = [];   // rotating ? boxes on the track
let droppedHazards = []; // banana peels placed by players/AI

function initPowerups() {
  powerupItems = POWERUP_SPAWN_INDICES.map(splineIdx => ({
    splineIdx,
    active: true,
    respawnTimer: 0,
  }));
  droppedHazards = [];
}

function activatePowerup(car) {
  if (!car.heldPowerup || car.spinTimer > 0) return;
  const def = POWERUP_DEFS.find(d => d.id === car.heldPowerup);
  if (!def) return;

  car.heldPowerup = null;

  switch (def.id) {
    case 'boost':
      car.activePowerupType = 'boost';
      car.speedMultiplier = 1.8;
      car.powerupTimer = def.duration;
      car.speed = car.maxSpeed * 1.8; // immediate speed kick
      spawnParticles(car.x, car.y, def.particleColor, 12);
      break;

    case 'rocket':
      car.activePowerupType = 'rocket';
      car.speedMultiplier = 2.6;
      car.powerupTimer = def.duration;
      car.speed = car.maxSpeed * 2.6; // dramatic instant burst
      spawnParticles(car.x, car.y, def.particleColor, 16);
      break;

    case 'shield':
      car.activePowerupType = 'shield';
      car.shieldActive = true;
      car.powerupTimer = def.duration;
      spawnParticles(car.x, car.y, def.particleColor, 10);
      break;

    case 'star':
      car.activePowerupType = 'star';
      car.speedMultiplier = 2.0;
      car.shieldActive = true;
      car.powerupTimer = def.duration;
      car.speed = car.maxSpeed * 2.0; // immediate speed kick
      spawnParticles(car.x, car.y, def.particleColor, 18);
      break;

    case 'banana':
      // Drop a peel behind the car
      droppedHazards.push({
        x: car.x - Math.cos(car.angle) * 32,
        y: car.y - Math.sin(car.angle) * 32,
        active: true,
      });
      spawnParticles(car.x, car.y, def.particleColor, 8);
      break;

    case 'ink': {
      // Slow the nearest rival ahead (or behind if in 1st)
      const sorted = [...allCars].sort((a, b) => b.getOverallProgress() - a.getOverallProgress());
      const idx = sorted.indexOf(car);
      const targetIdx = idx === 0 ? 1 : idx - 1;
      const target = sorted[targetIdx];
      if (target && target !== car && !target.finished && !target.shieldActive) {
        target.slowTimer = 3000;
        spawnParticles(target.x, target.y, def.particleColor, 16);
      }
      spawnParticles(car.x, car.y, def.particleColor, 8);
      break;
    }
  }
}

function updatePowerups(dt) {
  // Respawn timers for track items
  for (const item of powerupItems) {
    if (!item.active) {
      item.respawnTimer -= dt;
      if (item.respawnTimer <= 0) item.active = true;
    }
  }

  // Pickup detection
  for (const car of allCars) {
    if (car.finished || car.heldPowerup) continue;
    for (const item of powerupItems) {
      if (!item.active) continue;
      const sp = trackSpline[item.splineIdx];
      if (Math.hypot(car.x - sp.x, car.y - sp.y) < 32) {
        const def = POWERUP_DEFS[Math.floor(Math.random() * POWERUP_DEFS.length)];
        car.heldPowerup = def.id;
        item.active = false;
        item.respawnTimer = 8000;
        spawnParticles(car.x, car.y, def.particleColor, 10);
        if (!car.isPlayer) {
          car.aiPowerupDelay = 900 + Math.random() * 1800;
        }
      }
    }
  }

  // Hazard (banana peel) collision
  for (const car of allCars) {
    if (car.finished || car.spinTimer > 0 || car.shieldActive) continue;
    for (const hazard of droppedHazards) {
      if (!hazard.active) continue;
      if (Math.hypot(car.x - hazard.x, car.y - hazard.y) < 22) {
        hazard.active = false;
        car.spinTimer = 1600;
        car.speed *= 0.25;
        spawnParticles(car.x, car.y, '255,230,0', 14);
      }
    }
  }

  droppedHazards = droppedHazards.filter(h => h.active);
}

function drawPowerupItems(camX, camY, timestamp) {
  for (const item of powerupItems) {
    if (!item.active) continue;
    const sp = trackSpline[item.splineIdx];
    const sx = sp.x - camX;
    const sy = sp.y - camY;
    const rot = timestamp * 0.0018;
    const pulse = 0.88 + Math.sin(timestamp * 0.004) * 0.12;
    const s = 13 * pulse;

    ctx.save();
    ctx.translate(sx, sy);

    // Ground ring
    ctx.beginPath();
    ctx.arc(0, 0, s + 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,200,0,0.12)';
    ctx.fill();

    ctx.rotate(rot);
    ctx.shadowColor = 'rgba(255,200,0,0.9)';
    ctx.shadowBlur = 18 * pulse;

    // Outer box
    ctx.fillStyle = '#b36b00';
    ctx.fillRect(-s, -s, s * 2, s * 2);

    // Inner face
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-s + 2, -s + 2, s * 2 - 4, s * 2 - 4);

    // "?" text
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#7a4400';
    ctx.font = `bold ${Math.round(s * 1.3)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', 0, 1);

    ctx.restore();
  }
}

function drawHazards(camX, camY) {
  for (const hazard of droppedHazards) {
    const sx = hazard.x - camX;
    const sy = hazard.y - camY;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.shadowColor = 'rgba(255,230,0,0.8)';
    ctx.shadowBlur = 10;
    // Banana peel — two overlapping ellipses
    ctx.fillStyle = '#FFE600';
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 5, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ccb800';
    ctx.beginPath();
    ctx.ellipse(0, 0, 6, 3, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// --- COUNTDOWN ---
function startCountdown() {
  gameState = 'countdown';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').classList.add('visible');
  document.getElementById('minimap').classList.add('visible');

  let count = 3;
  const countEl = document.getElementById('countdown');

  function showCount() {
    if (count > 0) {
      countEl.textContent = count;
      countEl.style.opacity = '1';
      countEl.style.animation = 'countPop 0.9s ease-out forwards';
      count--;
      setTimeout(() => {
        countEl.style.animation = 'none';
        void countEl.offsetHeight;
        setTimeout(showCount, 100);
      }, 800);
    } else {
      countEl.textContent = 'GO!';
      countEl.style.color = '#27C1F4';
      countEl.style.opacity = '1';
      countEl.style.animation = 'countPop 0.9s ease-out forwards';
      gameState = 'racing';
      raceTime = 0;
      player.lapStartTime = 0;
      setTimeout(() => {
        countEl.style.opacity = '0';
        countEl.style.color = '#fff';
      }, 800);
    }
  }

  showCount();
}

function restartRace() {
  gameState = 'menu';
  raceTime = 0;
  bestLap = Infinity;
  lapTimes = [];

  document.getElementById('finish-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('minimap').classList.remove('visible');

  createCars();
  initPowerups();
}

function showFinish() {
  gameState = 'finished';

  const sorted = [...allCars].sort((a, b) => {
    if (a.finished && !b.finished) return -1;
    if (!a.finished && b.finished) return 1;
    if (a.finished && b.finished) return a.finishTime - b.finishTime;
    return b.getOverallProgress() - a.getOverallProgress();
  });

  const playerPos = sorted.indexOf(player) + 1;
  const positions = ['1st', '2nd', '3rd', '4th'];
  const titles = ['You Win!', 'Runner Up!', 'Third Place!', 'Keep Trying!'];

  document.getElementById('finish-title').textContent = titles[playerPos - 1];
  document.getElementById('finish-position').textContent = `You finished ${positions[playerPos - 1]}`;
  document.getElementById('finish-time').textContent = formatTime(player.finishTime);
  document.getElementById('finish-best').textContent = bestLap < Infinity ? formatTime(bestLap) : '--:--.-';
  document.getElementById('finish-screen').style.display = 'flex';
}

function formatTime(ms) {
  const totalSecs = ms / 1000;
  const mins = Math.floor(totalSecs / 60);
  const secs = totalSecs % 60;
  return `${mins}:${secs < 10 ? '0' : ''}${secs.toFixed(1)}`;
}

// --- DRAW TRACK ---
function drawTrack(camX, camY) {
  // Track surface
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Outer glow
  ctx.beginPath();
  for (let i = 0; i < trackSpline.length; i++) {
    const p = trackSpline[i];
    if (i === 0) ctx.moveTo(p.x - camX, p.y - camY);
    else ctx.lineTo(p.x - camX, p.y - camY);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(39, 193, 244, 0.08)';
  ctx.lineWidth = TRACK_WIDTH + 40;
  ctx.stroke();

  // Track surface
  ctx.beginPath();
  for (let i = 0; i < trackSpline.length; i++) {
    const p = trackSpline[i];
    if (i === 0) ctx.moveTo(p.x - camX, p.y - camY);
    else ctx.lineTo(p.x - camX, p.y - camY);
  }
  ctx.closePath();
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = TRACK_WIDTH;
  ctx.stroke();

  // Edge lines (neon)
  for (let side = -1; side <= 1; side += 2) {
    ctx.beginPath();
    for (let i = 0; i < trackSpline.length; i++) {
      const p = trackSpline[i];
      const n = getTrackNormal(i);
      const ex = p.x + n.x * (TRACK_WIDTH / 2) * side - camX;
      const ey = p.y + n.y * (TRACK_WIDTH / 2) * side - camY;
      if (i === 0) ctx.moveTo(ex, ey);
      else ctx.lineTo(ex, ey);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(39, 193, 244, 0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Centre line (dashed)
  ctx.setLineDash([15, 25]);
  ctx.beginPath();
  for (let i = 0; i < trackSpline.length; i++) {
    const p = trackSpline[i];
    if (i === 0) ctx.moveTo(p.x - camX, p.y - camY);
    else ctx.lineTo(p.x - camX, p.y - camY);
  }
  ctx.closePath();
  ctx.strokeStyle = 'rgba(39, 193, 244, 0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  // Start/finish line
  const sp = trackSpline[startIdx];
  const sn = getTrackNormal(startIdx);
  const sx1 = sp.x + sn.x * TRACK_WIDTH / 2 - camX;
  const sy1 = sp.y + sn.y * TRACK_WIDTH / 2 - camY;
  const sx2 = sp.x - sn.x * TRACK_WIDTH / 2 - camX;
  const sy2 = sp.y - sn.y * TRACK_WIDTH / 2 - camY;

  // Checkerboard pattern
  const numChecks = 8;
  for (let i = 0; i < numChecks; i++) {
    const t = i / numChecks;
    const nx = sx1 + (sx2 - sx1) * t;
    const ny = sy1 + (sy2 - sy1) * t;
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.7)' : 'rgba(39,193,244,0.5)';
    ctx.fillRect(nx - 3, ny - 3, 7, 7);
  }
}

// --- DRAW MINIMAP ---
function drawMinimap() {
  const mc = minimapCtx;
  const mw = 160;
  const mh = 160;

  mc.clearRect(0, 0, mw, mh);

  // Background
  mc.fillStyle = 'rgba(0, 0, 0, 0.6)';
  mc.beginPath();
  mc.roundRect(0, 0, mw, mh, 10);
  mc.fill();
  mc.strokeStyle = 'rgba(39, 193, 244, 0.3)';
  mc.lineWidth = 1;
  mc.stroke();

  // Scale track to minimap
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of trackSpline) {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  }

  const padding = 15;
  const scaleX = (mw - padding * 2) / (maxX - minX);
  const scaleY = (mh - padding * 2) / (maxY - minY);
  const scale = Math.min(scaleX, scaleY);
  const offsetX = (mw - (maxX - minX) * scale) / 2;
  const offsetY = (mh - (maxY - minY) * scale) / 2;

  function mapX(x) { return (x - minX) * scale + offsetX; }
  function mapY(y) { return (y - minY) * scale + offsetY; }

  // Draw track
  mc.beginPath();
  for (let i = 0; i < trackSpline.length; i++) {
    const p = trackSpline[i];
    if (i === 0) mc.moveTo(mapX(p.x), mapY(p.y));
    else mc.lineTo(mapX(p.x), mapY(p.y));
  }
  mc.closePath();
  mc.strokeStyle = 'rgba(39, 193, 244, 0.4)';
  mc.lineWidth = 3;
  mc.stroke();

  // Draw cars
  for (const car of allCars) {
    mc.beginPath();
    mc.arc(mapX(car.x), mapY(car.y), car.isPlayer ? 4 : 3, 0, Math.PI * 2);
    mc.fillStyle = car.isPlayer ? '#27C1F4' : car.glowColor;
    mc.fill();

    if (car.isPlayer) {
      mc.beginPath();
      mc.arc(mapX(car.x), mapY(car.y), 6, 0, Math.PI * 2);
      mc.strokeStyle = 'rgba(39, 193, 244, 0.4)';
      mc.lineWidth = 1;
      mc.stroke();
    }
  }
}

// --- HUD ---
function updateHUD() {
  // Position
  const sorted = [...allCars].sort((a, b) => b.getOverallProgress() - a.getOverallProgress());
  const pos = sorted.indexOf(player) + 1;
  const suffixes = ['st', 'nd', 'rd', 'th'];
  document.getElementById('hud-position').textContent = pos + suffixes[pos - 1];

  // Lap
  const displayLap = Math.min(player.lap + 1, TOTAL_LAPS);
  document.getElementById('hud-lap').textContent = `${displayLap} / ${TOTAL_LAPS}`;

  // Time
  document.getElementById('hud-time').textContent = formatTime(raceTime);

  // Speed
  const displaySpeed = Math.round(Math.abs(player.speed) * 40);
  document.getElementById('hud-speed').textContent = displaySpeed;

  // Power-up slot
  const puEl = document.getElementById('hud-powerup');
  const puItem = document.getElementById('hud-powerup-item');
  if (puEl && puItem) {
    let def = null;
    let label = '---';
    let active = false;
    if (player.activePowerupType) {
      def = POWERUP_DEFS.find(d => d.id === player.activePowerupType);
      label = def ? def.label + '!' : '---';
      active = true;
    } else if (player.heldPowerup) {
      def = POWERUP_DEFS.find(d => d.id === player.heldPowerup);
      label = def ? def.label : '---';
    }
    puEl.textContent = label;
    puEl.style.color = def ? def.color : '#888';
    puItem.style.borderColor = def ? def.color + '88' : 'rgba(39,193,244,0.3)';
    puItem.style.boxShadow = active && def ? `0 0 14px ${def.color}55` : 'none';
    if (def && !active) puItem.classList.add('has-item');
    else puItem.classList.remove('has-item');
  }
}

// --- MAIN LOOP ---
function gameLoop(timestamp) {
  const dt = lastTimestamp ? timestamp - lastTimestamp : 16;
  lastTimestamp = timestamp;

  if (gameState === 'racing') {
    raceTime += dt;

    // Update cars
    for (const car of allCars) {
      car.update(dt, keys);
    }

    // Update power-up pickups, hazards, and respawns
    updatePowerups(dt);

    // Check if player finished
    if (player.finished && gameState === 'racing') {
      showFinish();
    }

    updateHUD();
  } else if (gameState === 'countdown') {
    // Cars idle during countdown
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.015;
    if (p.alpha <= 0) particles.splice(i, 1);
  }

  // --- RENDER ---
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Camera follows player
  const camX = player.x - canvas.width / 2;
  const camY = player.y - canvas.height / 2;

  // Draw stars
  for (const star of stars) {
    const sx = star.x - camX * 0.1;
    const sy = star.y - camY * 0.1;
    const twinkle = Math.sin(timestamp * 0.002 + star.twinkle) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(39, 193, 244, ${star.alpha * twinkle * 0.3})`;
    ctx.fill();
  }

  // Draw track
  drawTrack(camX, camY);

  // Draw power-up items and dropped hazards
  drawPowerupItems(camX, camY, timestamp);
  drawHazards(camX, camY);

  // Draw particles
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y - camY, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color}, ${p.alpha})`;
    ctx.fill();
  }

  // Draw cars (AI first, player on top)
  for (const car of aiCars) {
    car.draw(ctx, camX, camY);
  }
  player.draw(ctx, camX, camY);

  // Minimap
  if (gameState === 'racing' || gameState === 'countdown') {
    drawMinimap();
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
